<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">TechStore</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!--  Product Section -->
<div class="container mt-5">
  <div class="row">

    <!-- Card 1 -->
    <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Laptop</h5>
          <p>High performance laptop</p>
          <h6>₹50,000</h6>
          <span class="badge bg-success">New</span>
          <br><br>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal1">
            View Details
          </button>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Mobile</h5>
          <p>Latest smartphone</p>
          <h6>₹20,000</h6>
          <span class="badge bg-danger">Sale</span>
          <br><br>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal2">
            View Details
          </button>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Headphones</h5>
          <p>Noise cancelling</p>
          <h6>₹5,000</h6>
          <span class="badge bg-success">New</span>
          <br><br>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal3">
            View Details
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!--  Modal Example -->
<div class="modal fade" id="modal1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Laptop Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        This is a high-performance laptop with 16GB RAM.
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>©️ 2026 TechStore | Follow us on social media</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
